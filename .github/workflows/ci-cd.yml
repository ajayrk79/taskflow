# ============================================================
#  TaskFlow — GitHub Actions CI/CD Pipeline
#  File: .github/workflows/ci-cd.yml
# ============================================================
#
#  WHAT THIS PIPELINE DOES (in order):
#  1. Triggers on every push & pull-request to main/develop
#  2. CI  → install → lint → run tests → build
#  3. CD  → deploy to production (only on push to main)
#  4. Verify → hits /health endpoint to confirm the deploy worked
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Continuous Integration (CI)
  # Runs on every push and every pull-request
  # Goal: Make sure the code is correct BEFORE merging
  # ──────────────────────────────────────────────────────────
  ci:
    name: "CI — Test & Build"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Node.js runtime
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install all dependencies
      - name: Install dependencies
        run: npm ci         # 'ci' is faster & stricter than 'npm install'

      # Step 4: Lint — checks code style (catches typos, bad patterns)
      - name: Lint code
        run: npm run lint   # e.g. eslint .

      # Step 5: Run unit tests (this is the most important step)
      - name: Run tests
        run: npm test       # runs server.test.js via Jest

      # Step 6: If all tests pass, build the production bundle
      - name: Build
        run: npm run build  # e.g. creates /dist folder

      # Step 7: Save the build so the CD job can use it
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  # ──────────────────────────────────────────────────────────
  # JOB 2: Continuous Deployment (CD)
  # Runs ONLY when code is pushed/merged into the main branch
  # Goal: Automatically ship the tested code to production
  # ──────────────────────────────────────────────────────────
  cd:
    name: "CD — Deploy to Production"
    runs-on: ubuntu-latest
    needs: ci                            # Wait for CI to pass first
    if: github.ref == 'refs/heads/main'  # Only deploy from main branch

    environment:
      name: production
      url: https://taskflow.example.com  # shown in GitHub UI after deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the build that CI created
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      # Build and push Docker image to registry
      - name: Build Docker image
        run: |
          docker build -t taskflow:${{ github.sha }} .
          docker tag  taskflow:${{ github.sha }} ghcr.io/myorg/taskflow:latest

      - name: Push Docker image
        run: docker push ghcr.io/myorg/taskflow:latest
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}

      # SSH into server and pull the new image
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/myorg/taskflow:latest
            docker stop taskflow || true
            docker rm   taskflow || true
            docker run -d \
              --name taskflow \
              -p 3000:3000 \
              -e NODE_ENV=production \
              --restart unless-stopped \
              ghcr.io/myorg/taskflow:latest
            echo "Deploy complete — container running"

  # ──────────────────────────────────────────────────────────
  # JOB 3: Post-deploy health check
  # Hits the /health endpoint to confirm the app is live
  # ──────────────────────────────────────────────────────────
  verify:
    name: "Verify — Health Check"
    runs-on: ubuntu-latest
    needs: cd

    steps:
      - name: Wait for server to start
        run: sleep 15

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://taskflow.example.com/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check FAILED — HTTP $STATUS"
            exit 1
          fi
          echo "Health check PASSED — HTTP $STATUS"
